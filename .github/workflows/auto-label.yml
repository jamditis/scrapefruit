name: Auto-label issue

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
    steps:
      - uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const title = context.payload.issue.title;
            const body = (context.payload.issue.body || '').slice(0, 500);
            let label = 'needs-triage';
            try {
              const response = await fetch(
                'https://models.inference.ai.azure.com/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [{ role: 'user', content: `Classify this GitHub issue as exactly one word: bug, enhancement, question, or duplicate.\n\nTitle: ${title}\nBody: ${body}` }],
                    max_tokens: 5,
                  }),
                }
              );
              const data = await response.json();
              const candidate = data.choices[0].message.content.trim().toLowerCase();
              const valid = ['bug', 'enhancement', 'question', 'duplicate'];
              if (valid.includes(candidate)) label = candidate;
            } catch (e) {
              console.log('Model call failed, using needs-triage:', e.message);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label],
            });
